name: md_explorer
description: "A fast, offline Markdown file explorer and viewer for desktop and mobile."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI & Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  phosphor_flutter: ^2.1.0

  # Markdown Rendering
  flutter_markdown_plus: ^1.0.2
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  markdown: ^7.3.0

  # File System
  file_picker: ^10.3.9
  file_tree_view: ^0.0.7
  watcher: ^1.1.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Persistence
  shared_preferences: ^2.5.3

  # Window Control (Desktop)
  window_manager: ^0.4.3

  # Responsive Utilities
  responsive_framework: ^1.5.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
